# Note: The 'version' tag is obsolete and has been removed.
services:
  backend:
    build:
      context: .
      target: builder  # Use the builder stage for development (has all deps)
    env_file:
      - .env 
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
      - "5555:5555"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/src/generated
    command: npm run dev
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DIRECT_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # MinIO (local R2 equivalent) — credentials come from .env
      - R2_ENDPOINT=http://minio:9000
      - R2_PUBLIC_ENDPOINT=http://localhost:9000
      - R2_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - R2_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - R2_BUCKET_NAME=${MINIO_BUCKET_NAME}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  db:
    image: postgres:16
    restart: always
    env_file:
      - .env # The db service will pick up the POSTGRES_* variables
    ports:
      # Use variable substitution from the .env file
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck: # <-- ADD THIS ENTIRE BLOCK
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgadmin:
  #   image: dpage/pgadmin4
  #   restart: always
  #   env_file:
  #     - .env # The pgadmin service will pick up the PGADMIN_* variables
  #   ports:
  #     - "${PGADMIN_PORT}:80"
  #   depends_on:
  #     db: # It's also good practice for pgadmin to wait for db to be healthy
  #       condition: service_healthy
  # --- pgAdmin Configuration ---
  # PGADMIN_DEFAULT_EMAIL=admin@example.com
  # PGADMIN_DEFAULT_PASSWORD=Th1s_is_a_V3ry-S3cur3-P4ss
  # PGADMIN_PORT=5050

  # ── MinIO (local Cloudflare R2 equivalent) ────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: always
    env_file:
      - .env
    ports:
      - "9000:9000"   # S3 API (used by the backend)
      - "9001:9001"   # MinIO Web Console (browser UI)
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MinIO Init (creates the bucket on first start, then exits) ───────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${MINIO_BUCKET_NAME};
      echo 'Bucket $${MINIO_BUCKET_NAME} is ready.';
      exit 0;
      "
    restart: "no"

volumes:
  pgdata:
  minio_data: