version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "${DB_PORT}:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "${PGADMIN_PORT}:80"

    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: backend_api
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"

    depends_on:
      db:
        condition: service_healthy

    command: >
      sh -c "
      npx prisma migrate deploy &&
      node dist/server.js
      "

  prisma-studio:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: prisma_studio

    env_file:
      - .env

    ports:
      - "5555:5555"

    depends_on:
      db:
        condition: service_healthy

    command: >
      sh -c "npx prisma studio"

  frontend:
    image: node:24-slim

    container_name: frontend_web
    restart: unless-stopped

    working_dir: /usr/src/app

    volumes:
      - ./frontend:/usr/src/app

    ports:
      - "5173:5173"

    environment:
      VITE_API_URL: http://localhost:${HOST_PORT}

    command: >
      sh -c "
      npm install &&
      npm run dev -- --host
      "

volumes:
  pgdata: